<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    -webkit-app-region: drag;
  }

  /* Scan lines overlay */
  .scanlines {
    position: fixed; inset: 0; z-index: 10; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    opacity: 0;
    animation: fadeIn 0.3s 0.5s forwards;
  }

  /* Grid background */
  .grid-bg {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0;
    animation: gridReveal 1.5s 0.2s forwards;
  }

  /* Digital rain columns */
  .rain { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
  .rain-col {
    position: absolute; top: -100%; font-size: 10px; line-height: 14px;
    color: rgba(255,255,255,0.08); font-family: monospace; letter-spacing: 4px;
    animation: rainFall linear infinite;
    writing-mode: vertical-rl; text-orientation: upright;
  }

  /* Central container */
  .container {
    position: relative; z-index: 5;
    display: flex; flex-direction: column; align-items: center; gap: 0;
  }

  /* Hexagon frame around logo */
  .hex-frame {
    position: relative; width: 260px; height: 260px;
    opacity: 0; animation: hexAppear 0.6s 0.8s forwards;
  }
  .hex-border {
    position: absolute; inset: 0;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50%;
    animation: hexPulse 2s ease-in-out infinite;
  }
  .hex-border:nth-child(2) {
    inset: 12px;
    border-color: rgba(255,255,255,0.05);
    animation-delay: 0.3s;
  }
  .hex-border:nth-child(3) {
    inset: 24px;
    border-color: rgba(255,255,255,0.12);
    animation-delay: 0.6s;
  }
  .hex-border:nth-child(4) {
    inset: 36px;
    border-color: rgba(255,255,255,0.2);
    animation-delay: 0.9s;
  }
  .hex-corner {
    position: absolute; width: 8px; height: 8px;
    border: 1.5px solid rgba(255,255,255,0.4);
    transform: rotate(45deg);
  }
  .hex-corner:nth-child(5) { top: -4px; left: 50%; margin-left: -4px; }
  .hex-corner:nth-child(6) { bottom: -4px; left: 50%; margin-left: -4px; }
  .hex-corner:nth-child(7) { left: -4px; top: 50%; margin-top: -4px; }
  .hex-corner:nth-child(8) { right: -4px; top: 50%; margin-top: -4px; }

  /* Logo text */
  .logo-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }
  .logo-text {
    font-size: 42px; font-weight: 900; letter-spacing: 10px;
    color: #fff; position: relative;
    text-shadow: 0 0 30px rgba(255,255,255,0.2);
  }
  /* Glitch layers */
  .glitch { position: relative; }
  .glitch::before, .glitch::after {
    content: attr(data-text); position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .glitch::before {
    color: rgba(255,255,255,0.5); z-index: -1;
    animation: glitch1 3s infinite;
  }
  .glitch::after {
    color: rgba(255,255,255,0.3); z-index: -2;
    animation: glitch2 3s infinite;
  }

  .version {
    font-size: 9px; letter-spacing: 6px; color: rgba(255,255,255,0.25);
    margin-top: 8px; font-weight: 400;
  }

  /* Horizontal scan beam */
  .scan-beam {
    position: absolute; left: -40px; right: -40px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    box-shadow: 0 0 15px rgba(255,255,255,0.3), 0 0 40px rgba(255,255,255,0.1);
    opacity: 0; animation: scanBeam 2s 1.2s forwards;
  }

  /* Bottom bar */
  .bottom-section {
    margin-top: 48px; display: flex; flex-direction: column; align-items: center; gap: 14px;
    opacity: 0; animation: fadeSlideUp 0.5s 2s forwards;
  }
  .loading-bar {
    width: 180px; height: 2px; background: rgba(255,255,255,0.06);
    border-radius: 1px; overflow: hidden; position: relative;
  }
  .loading-fill {
    position: absolute; left: 0; top: 0; height: 100%; width: 0%;
    background: #fff; border-radius: 1px;
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
    animation: barFill 2.2s 2.2s forwards;
  }
  .loading-fill::after {
    content: ''; position: absolute; right: 0; top: -3px;
    width: 8px; height: 8px; background: #fff; border-radius: 50%;
    box-shadow: 0 0 12px #fff, 0 0 24px rgba(255,255,255,0.4);
    animation: dotPulse 0.6s ease-in-out infinite;
  }
  .status-text {
    font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,0.2);
    text-transform: uppercase; font-weight: 400;
  }

  /* Floating particles */
  .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .particle {
    position: absolute; background: rgba(255,255,255,0.12);
    border-radius: 50%; animation: float linear infinite;
  }
  .particle-line {
    position: absolute; width: 1px; background: rgba(255,255,255,0.05);
    animation: lineFloat linear infinite;
  }

  /* Corner decorations */
  .corner-deco {
    position: fixed; width: 40px; height: 40px; z-index: 5;
    opacity: 0; animation: fadeIn 0.3s 1.5s forwards;
  }
  .corner-deco::before, .corner-deco::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.15);
  }
  .corner-deco.tl { top: 20px; left: 20px; }
  .corner-deco.tl::before { width: 20px; height: 1px; top: 0; left: 0; }
  .corner-deco.tl::after { width: 1px; height: 20px; top: 0; left: 0; }
  .corner-deco.tr { top: 20px; right: 20px; }
  .corner-deco.tr::before { width: 20px; height: 1px; top: 0; right: 0; }
  .corner-deco.tr::after { width: 1px; height: 20px; top: 0; right: 0; }
  .corner-deco.bl { bottom: 20px; left: 20px; }
  .corner-deco.bl::before { width: 20px; height: 1px; bottom: 0; left: 0; }
  .corner-deco.bl::after { width: 1px; height: 20px; bottom: 0; left: 0; }
  .corner-deco.br { bottom: 20px; right: 20px; }
  .corner-deco.br::before { width: 20px; height: 1px; bottom: 0; right: 0; }
  .corner-deco.br::after { width: 1px; height: 20px; bottom: 0; right: 0; }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes gridReveal { to { opacity: 1; } }
  @keyframes rainFall {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(200vh); }
  }
  @keyframes hexAppear {
    from { opacity: 0; transform: scale(0.8) rotate(-10deg); }
    to { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  @keyframes hexPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.03); opacity: 0.6; }
  }
  @keyframes glitch1 {
    0%, 92%, 100% { transform: translate(0); }
    93% { transform: translate(-3px, 1px); }
    95% { transform: translate(2px, -1px); }
    97% { transform: translate(-1px, 2px); }
  }
  @keyframes glitch2 {
    0%, 90%, 100% { transform: translate(0); }
    91% { transform: translate(2px, -1px); }
    94% { transform: translate(-2px, 1px); }
    96% { transform: translate(1px, -2px); }
  }
  @keyframes scanBeam {
    0% { top: -10%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: 110%; opacity: 0; }
  }
  @keyframes barFill {
    0% { width: 0%; }
    15% { width: 18%; }
    40% { width: 45%; }
    65% { width: 70%; }
    85% { width: 90%; }
    100% { width: 100%; }
  }
  @keyframes dotPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.6; }
  }
  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }
  @keyframes lineFloat {
    0% { transform: translateY(100vh); opacity: 0; }
    10% { opacity: 0.5; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-100vh); opacity: 0; }
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="scanlines"></div>
  <div class="rain" id="rain"></div>
  <div class="particles" id="particles"></div>

  <div class="corner-deco tl"></div>
  <div class="corner-deco tr"></div>
  <div class="corner-deco bl"></div>
  <div class="corner-deco br"></div>

  <div class="container">
    <div class="hex-frame">
      <div class="hex-border"></div>
      <div class="hex-border"></div>
      <div class="hex-border"></div>
      <div class="hex-border"></div>
      <div class="hex-corner"></div>
      <div class="hex-corner"></div>
      <div class="hex-corner"></div>
      <div class="hex-corner"></div>
      <div class="logo-wrap">
        <div class="logo-text glitch" data-text="CHOATIX">CHOATIX</div>
        <div class="version">v2.0</div>
      </div>
      <div class="scan-beam"></div>
    </div>

    <div class="bottom-section">
      <div class="loading-bar">
        <div class="loading-fill"></div>
      </div>
      <div class="status-text" id="status">INITIALIZING SYSTEMS</div>
    </div>
  </div>

  <script>
    // Digital rain columns
    const rain = document.getElementById('rain');
    const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ';
    for (let i = 0; i < 30; i++) {
      const col = document.createElement('div');
      col.className = 'rain-col';
      col.style.left = (Math.random() * 100) + '%';
      col.style.animationDuration = (6 + Math.random() * 8) + 's';
      col.style.animationDelay = (Math.random() * 5) + 's';
      let text = '';
      for (let j = 0; j < 20; j++) text += chars[Math.floor(Math.random() * chars.length)];
      col.textContent = text;
      rain.appendChild(col);
    }

    // Particles
    const pc = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const isLine = Math.random() > 0.6;
      const el = document.createElement('div');
      el.className = isLine ? 'particle-line' : 'particle';
      el.style.left = Math.random() * 100 + '%';
      el.style.animationDuration = (3 + Math.random() * 7) + 's';
      el.style.animationDelay = Math.random() * 4 + 's';
      if (isLine) {
        el.style.height = (20 + Math.random() * 60) + 'px';
      } else {
        const s = 1 + Math.random() * 3;
        el.style.width = s + 'px';
        el.style.height = s + 'px';
      }
      pc.appendChild(el);
    }

    // Status cycling
    const statuses = [
      'INITIALIZING SYSTEMS', 'LOADING KERNEL', 'SCANNING HARDWARE',
      'PREPARING OPTIMIZER', 'CONNECTING MODULES', 'READY'
    ];
    let si = 0;
    setInterval(() => {
      si = (si + 1) % statuses.length;
      document.getElementById('status').textContent = statuses[si];
    }, 700);
  </script>
</body>
</html>
