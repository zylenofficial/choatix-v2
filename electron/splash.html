<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    -webkit-app-region: drag;
  }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 50px 50px;
  }

  .vignette {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.7) 100%);
  }

  .wrapper {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    opacity: 0; animation: fadeIn 0.8s 0.2s forwards;
  }

  .logo-area {
    position: relative;
    width: 200px; height: 200px;
    display: flex; align-items: center; justify-content: center;
  }

  .ring {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.06);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .ring-1 { width: 200px; height: 200px; animation: spin 18s linear infinite; }
  .ring-2 { width: 160px; height: 160px; animation: spin 12s linear infinite reverse; border-color: rgba(255,255,255,0.04); }
  .ring-3 { width: 120px; height: 120px; animation: spin 8s linear infinite; border-color: rgba(255,255,255,0.08); }

  .ring-dot {
    position: absolute; width: 5px; height: 5px; background: rgba(255,255,255,0.5);
    border-radius: 50%; top: -2.5px; left: 50%; margin-left: -2.5px;
    box-shadow: 0 0 8px rgba(255,255,255,0.3);
  }

  .logo-img {
    width: 120px; height: auto;
    filter: brightness(0) invert(1);
    position: relative; z-index: 5;
  }

  .logo-glow {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 160px; height: 160px; z-index: 1;
    background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
    animation: glowPulse 4s ease-in-out infinite;
  }

  .status-area {
    margin-top: 40px; display: flex; flex-direction: column; align-items: center; gap: 12px;
    opacity: 0; animation: fadeIn 0.5s 1.5s forwards;
  }

  .loader {
    width: 180px; height: 2px; background: rgba(255,255,255,0.04);
    border-radius: 1px; overflow: hidden; position: relative;
  }
  .loader-fill {
    position: absolute; top: 0; left: 0; height: 100%; width: 0%;
    background: rgba(255,255,255,0.4);
    border-radius: 1px; animation: loadBar 2.5s 2s forwards;
  }
  .loader-fill::after {
    content: ''; position: absolute; right: 0; top: -4px;
    width: 10px; height: 10px; background: #fff; border-radius: 50%;
    box-shadow: 0 0 12px #fff, 0 0 30px rgba(255,255,255,0.3);
  }

  .status-text {
    font-size: 9px; letter-spacing: 5px; color: rgba(255,255,255,0.15);
    font-family: 'Consolas', monospace;
  }

  .version {
    font-size: 8px; letter-spacing: 3px; color: rgba(255,255,255,0.08);
    font-family: 'Consolas', monospace;
    margin-top: 4px;
  }

  .scan-line {
    position: fixed; left: 0; right: 0; height: 1px; z-index: 20;
    background: linear-gradient(90deg, transparent 10%, rgba(255,255,255,0.4) 50%, transparent 90%);
    opacity: 0; animation: scanDown 2s 0.8s forwards;
  }

  /* Corner brackets */
  .corner { position: fixed; z-index: 15; opacity: 0; animation: fadeIn 0.3s 1.2s forwards; }
  .corner::before, .corner::after { content: ''; position: absolute; background: rgba(255,255,255,0.1); }
  .corner.tl { top: 20px; left: 20px; }
  .corner.tl::before { width: 20px; height: 1px; }
  .corner.tl::after { width: 1px; height: 20px; }
  .corner.tr { top: 20px; right: 20px; }
  .corner.tr::before { width: 20px; height: 1px; right: 0; }
  .corner.tr::after { width: 1px; height: 20px; right: 0; }
  .corner.bl { bottom: 20px; left: 20px; }
  .corner.bl::before { width: 20px; height: 1px; bottom: 0; }
  .corner.bl::after { width: 1px; height: 20px; bottom: 0; }
  .corner.br { bottom: 20px; right: 20px; }
  .corner.br::before { width: 20px; height: 1px; bottom: 0; right: 0; }
  .corner.br::after { width: 1px; height: 20px; bottom: 0; right: 0; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
  @keyframes glowPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  @keyframes scanDown {
    0% { top: 0%; opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { top: 100%; opacity: 0; }
  }
  @keyframes loadBar {
    0% { width: 0%; }
    25% { width: 20%; }
    50% { width: 50%; }
    75% { width: 80%; }
    100% { width: 100%; }
  }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="vignette"></div>
  <div class="scan-line"></div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="wrapper">
    <div class="logo-area">
      <div class="logo-glow"></div>
      <div class="ring ring-1"><div class="ring-dot"></div></div>
      <div class="ring ring-2"><div class="ring-dot"></div></div>
      <div class="ring ring-3"><div class="ring-dot"></div></div>
      <img src="choatix-logo.png" class="logo-img" alt="CHOATIX" />
    </div>

    <div class="status-area">
      <div class="loader"><div class="loader-fill"></div></div>
      <div class="status-text" id="status">INITIALIZING</div>
      <div class="version">v2.0</div>
    </div>
  </div>

  <script>
    const msgs = ['INITIALIZING', 'LOADING KERNEL', 'SCANNING HARDWARE', 'PREPARING MODULES', 'CONNECTING', 'READY'];
    let i = 0;
    setInterval(() => {
      i = (i + 1) % msgs.length;
      document.getElementById('status').textContent = msgs[i];
    }, 600);
  </script>
</body>
</html>
