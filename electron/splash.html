<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    -webkit-app-region: drag;
  }

  /* Ambient background */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 100%);
    opacity: 0;
    animation: bgIn 2s 0.5s ease-out forwards;
  }
  @keyframes bgIn { to { opacity: 1; } }

  /* Particles */
  .particles {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
  }
  .dot {
    position: absolute;
    width: 2px; height: 2px;
    background: rgba(255,255,255,0.12);
    border-radius: 50%;
    opacity: 0;
  }
  .dot:nth-child(1) { left: 20%; top: 30%; animation: drift 12s 1s ease-in-out infinite; }
  .dot:nth-child(2) { left: 75%; top: 20%; animation: drift 15s 2s ease-in-out infinite; width: 1.5px; height: 1.5px; }
  .dot:nth-child(3) { left: 40%; top: 70%; animation: drift 18s 0.5s ease-in-out infinite; width: 1px; height: 1px; }
  .dot:nth-child(4) { left: 85%; top: 65%; animation: drift 14s 3s ease-in-out infinite; }
  .dot:nth-child(5) { left: 10%; top: 80%; animation: drift 16s 1.5s ease-in-out infinite; width: 1.5px; height: 1.5px; }
  .dot:nth-child(6) { left: 55%; top: 15%; animation: drift 20s 0s ease-in-out infinite; width: 1px; height: 1px; }
  .dot:nth-child(7) { left: 30%; top: 50%; animation: drift 13s 2.5s ease-in-out infinite; }
  .dot:nth-child(8) { left: 65%; top: 85%; animation: drift 17s 1s ease-in-out infinite; width: 1.5px; height: 1.5px; }

  @keyframes drift {
    0%, 100% { opacity: 0; transform: translate(0, 0); }
    25% { opacity: 0.6; }
    50% { opacity: 0.4; transform: translate(15px, -20px); }
    75% { opacity: 0.7; }
  }

  /* Center content */
  .center {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
  }

  /* Logo glow */
  .glow {
    position: absolute;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
    border-radius: 50%;
    opacity: 0;
    animation: glowIn 2s 0.8s ease-out forwards;
  }
  @keyframes glowIn { to { opacity: 1; } }

  /* Logo */
  .logo {
    width: 120px; height: auto;
    filter: brightness(0) invert(1);
    position: relative; z-index: 5;
    opacity: 0;
    animation: logoIn 1.2s 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes logoIn {
    from { opacity: 0; transform: scale(0.92) translateY(6px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Name */
  .name {
    margin-top: 28px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 10px; text-indent: 10px;
    color: rgba(255,255,255,0.5);
    opacity: 0;
    animation: fadeUp 0.8s 1.2s ease-out forwards;
  }

  /* Tagline */
  .tagline {
    margin-top: 6px;
    font-size: 8px; font-weight: 400;
    letter-spacing: 4px; text-indent: 4px;
    color: rgba(255,255,255,0.15);
    opacity: 0;
    animation: fadeUp 0.8s 1.4s ease-out forwards;
  }

  /* Loading */
  .loading {
    margin-top: 48px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    opacity: 0;
    animation: fadeUp 0.6s 2s ease-out forwards;
  }

  /* Progress bar */
  .bar-track {
    width: 180px; height: 1px;
    background: rgba(255,255,255,0.06);
    position: relative; overflow: hidden;
  }
  .bar-fill {
    position: absolute; top: 0; left: 0; height: 100%;
    width: 0%;
    background: rgba(255,255,255,0.35);
    animation: fillBar 2.2s 2.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes fillBar {
    0% { width: 0%; }
    20% { width: 15%; }
    40% { width: 40%; }
    60% { width: 62%; }
    80% { width: 85%; }
    100% { width: 100%; }
  }

  /* Status */
  .status {
    font-size: 8px; letter-spacing: 4px;
    color: rgba(255,255,255,0.2);
    font-family: 'Consolas', 'SF Mono', monospace;
    transition: opacity 0.2s ease;
  }

  /* Version */
  .ver {
    margin-top: 14px;
    font-size: 7px; letter-spacing: 3px;
    color: rgba(255,255,255,0.06);
    font-family: 'Consolas', 'SF Mono', monospace;
    opacity: 0;
    animation: fadeUp 0.5s 2.6s ease-out forwards;
  }

  /* Corner accents — subtle */
  .corner {
    position: fixed; z-index: 20;
    opacity: 0;
    animation: fadeIn 0.5s 1.6s ease-out forwards;
  }
  .corner::before, .corner::after {
    content: ''; position: absolute;
    background: rgba(255,255,255,0.04);
  }
  .corner.tl { top: 32px; left: 32px; }
  .corner.tl::before { width: 24px; height: 1px; }
  .corner.tl::after { width: 1px; height: 24px; }
  .corner.tr { top: 32px; right: 32px; }
  .corner.tr::before { width: 24px; height: 1px; right: 0; }
  .corner.tr::after { width: 1px; height: 24px; right: 0; }
  .corner.bl { bottom: 32px; left: 32px; }
  .corner.bl::before { width: 24px; height: 1px; bottom: 0; }
  .corner.bl::after { width: 1px; height: 24px; bottom: 0; }
  .corner.br { bottom: 32px; right: 32px; }
  .corner.br::before { width: 24px; height: 1px; bottom: 0; }
  .corner.br::after { width: 1px; height: 24px; bottom: 0; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div class="bg"></div>

  <div class="particles">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="center">
    <div class="glow"></div>
    <img src="choatix-logo.png" class="logo" alt="CHOATIX" />

    <div class="name">CHOATIX</div>
    <div class="tagline">GAMING PERFORMANCE OPTIMIZER</div>

    <div class="loading">
      <div class="bar-track"><div class="bar-fill"></div></div>
      <div class="status" id="status">INITIALIZING</div>
    </div>

    <div class="ver">v2.0.0</div>
  </div>

  <script>
    const steps = ['INITIALIZING','LOADING MODULES','SCANNING SYSTEM','PREPARING','READY'];
    let i = 0;
    const el = document.getElementById('status');
    const t = setInterval(() => {
      i++;
      if (i >= steps.length) { clearInterval(t); return; }
      el.style.opacity = '0';
      setTimeout(() => { el.textContent = steps[i]; el.style.opacity = '1'; }, 150);
    }, 450);
  </script>
</body>
</html>
